
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Game Wiki Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Mobile optimizations - Rise of Kingdoms style */
      @media (max-width: 768px) {
        html, body {
          overscroll-behavior: none;
          touch-action: none;
        }
        
        /* Compact resource text */
        .resource-text {
          font-size: 0.6rem !important;
        }
        
        .player-name {
          font-size: 0.75rem !important;
        }
        
        .stat-bars {
          height: 8px !important;
          width: 50px !important;
        }
        
        /* Chat - minimal on mobile, not half screen */
        .chat-window {
          width: 100% !important;
          max-height: 20vh !important;
        }
        .chat-window.chat-collapsed {
          max-height: 32px !important;
          height: 32px !important;
        }
        
        /* Smaller control buttons */
        .control-button {
          width: 32px !important;
          height: 32px !important;
        }
        
        /* Game buttons - bottom bar on mobile */
        .game-buttons-right {
          position: fixed !important;
          top: auto !important;
          bottom: 0 !important;
          right: 0 !important;
          left: 0 !important;
          flex-direction: row !important;
          justify-content: space-around !important;
          align-items: center !important;
          background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.5)) !important;
          padding: 4px 8px 6px 8px !important;
          gap: 2px !important;
          border-top: 1px solid rgba(255,255,255,0.1) !important;
          z-index: 60 !important;
        }
        .game-buttons-right .game-button img {
          width: 44px !important;
          height: 44px !important;
        }
        
        /* Resource icons smaller */
        .resource-icon {
          width: 28px !important;
          height: 28px !important;
        }
        
        /* Player info compact */
        .player-info {
          transform: scale(0.55) !important;
          transform-origin: top left !important;
        }
        
        /* Inventory button smaller */
        .inventory-btn img {
          width: 28px !important;
          height: 28px !important;
        }
        
        /* Chat moves above bottom bar */
        .chat-window {
          bottom: 54px !important;
        }
        
        /* Teleport cooldown above bottom bar */
        .teleport-cooldown {
          bottom: 70px !important;
        }
        
        /* Chat input area compact */
        .chat-input-area {
          padding: 3px !important;
          gap: 3px !important;
        }
        .chat-input-area input {
          font-size: 12px !important;
          padding: 4px 8px !important;
        }
        .chat-input-area button {
          padding: 4px 6px !important;
          font-size: 10px !important;
        }
        
        /* Chat messages compact */
        .chat-messages {
          padding: 2px !important;
        }
        .chat-messages .text-sm {
          font-size: 11px !important;
        }
        
        /* Chat tabs compact */
        .chat-tabs button {
          padding: 0 6px !important;
          font-size: 11px !important;
        }
        
        /* Hide online players sidebar on mobile */
        .chat-players-sidebar {
          display: none !important;
        }
        .chat-messages-container {
          width: 100% !important;
        }
        
        /* Zoom controls position */
        .zoom-controls {
          top: 2px !important;
          right: 2px !important;
        }
        .zoom-controls button {
          width: 28px !important;
          height: 28px !important;
          font-size: 14px !important;
        }
        .zoom-controls svg {
          width: 16px !important;
          height: 16px !important;
        }
      }
      
      /* Extra small phones */
      @media (max-width: 480px) {
        .resource-text {
          font-size: 0.55rem !important;
        }
        .player-name {
          font-size: 0.65rem !important;
        }
        .player-info {
          transform: scale(0.45) !important;
          transform-origin: top left !important;
        }
        .game-buttons-right .game-button img {
          width: 38px !important;
          height: 38px !important;
        }
        .resource-icon {
          width: 24px !important;
          height: 24px !important;
        }
      }
      
      /* Landscape mode optimizations */
      @media (max-height: 500px) and (orientation: landscape) {
        .chat-window {
          max-height: 30vh !important;
          bottom: 48px !important;
        }
        .player-info {
          transform: scale(0.5) !important;
          transform-origin: top left !important;
        }
        .game-buttons-right .game-button img {
          width: 36px !important;
          height: 36px !important;
        }
        .game-buttons-right {
          padding: 2px 8px 3px 8px !important;
        }
      }
      /* Minimalist scrollbar for build menu */
      .build-menu-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .build-menu-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .build-menu-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.25);
        border-radius: 10px;
      }
      .build-menu-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body class="bg-gray-900 text-gray-100 m-0 overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
